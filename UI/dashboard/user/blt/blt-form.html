<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pengajuan BLT • SIP BLT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="blt-form.css">
</head>

<body>

<main class="page">

<div class="form-card">

<h2>Ajukan Permohonan BLT</h2>

<p class="subtitle">
Silakan isi data berikut untuk pengajuan Bantuan Langsung Tunai.
</p>

<div id="successMessage" style="display:none; color:green; font-weight:bold;">
  ✅ Pengajuan berhasil dikirim. Silakan tunggu verifikasi dari admin.
</div>

<form id="userBLTForm" enctype="multipart/form-data">

<!-- ALAMAT -->
<div class="field">
<label>Alamat Lengkap</label>
<textarea name="address" rows="3" placeholder="Alamat sesuai KTP" required></textarea>
</div>

<!-- FOTO KTP -->
<div class="field">
<label>Foto KTP</label>
<input type="file" name="fotoKtp" accept="image/*" required>
</div>

<!-- FOTO KK -->
<div class="field">
<label>Foto Kartu Keluarga (KK)</label>
<input type="file" name="fotoKk" accept="image/*" required>
</div>

<!-- FOTO RUMAH -->
<div class="field">
<label>Foto Rumah Tampak Depan</label>
<input type="file" name="fotoRumah" accept="image/*" required>
</div>

<!-- FOTO DAPUR -->
<div class="field">
<label>Foto Dapur</label>
<input type="file" name="fotoDapur" accept="image/*" required>
</div>

<button type="submit" class="btn-submit">
Kirim Pengajuan
<i class="fa-solid fa-arrow-right"></i>
</button>

<p class="note">
Dengan mengirimkan formulir ini, Anda menyetujui proses verifikasi data.
</p>

</form>

</div>

</main>

<script src="blt-form.js"></script>

</body>
</html>
