<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Status Pengajuan BLT</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="status.css">
</head>
<body>

<div class="page-container">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="top-left">
            <h2>Status Pengajuan BLT</h2>
            <p>Pantau status pengajuan bantuan Anda secara real-time</p>
        </div>

        <div class="top-right">
            <i class="fa-regular fa-bell"></i>
            <div class="user">
                <span>
                    <b id="profileName">Loading...</b><br>
                    <small>Penerima Manfaat</small>
                </span>
                <div class="avatar" id="profileAvatar">..</div>
            </div>
        </div>
    </div>

    <!-- CARD -->
    <div class="status-card">

        <!-- CARD HEADER -->
        <div class="card-header">
            <div class="header-left">
                <div class="icon">
                    <i class="fa-solid fa-circle-info"></i>
                </div>
                <span>Informasi Pengajuan</span>
            </div>

            <span class="badge" id="headerBadge">...</span>
        </div>

        <!-- CARD BODY -->
        <div class="card-body">

            <div class="grid">
                <div class="item">
                    <label>Nama Lengkap</label>
                    <span id="valNama">...</span>
                </div>

                <div class="item">
                    <label>NIK</label>
                    <span id="valNik">...</span>
                </div>

                <div class="item">
                    <label>Status</label>
                    <span class="status" id="valStatus">...</span>
                </div>
            </div>

            <!-- KETERANGAN -->
            <div class="note">
                <label>Keterangan</label>
                <p id="noteDesc">Memuat data pengajuan dari server...</p>
            </div>

            <!-- FOOTER -->
            <div class="card-footer">
                <span class="update" id="updateTime">
                    Terakhir diperbarui: ...
                </span>

                <div class="actions">
                    <button class="btn-primary" id="btnPerbarui" style="display:none;" onclick="window.location.href='blt/blt-form.html'">
                        Perbarui Data
                    </button>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="status.js"></script>

</body>
</html>
